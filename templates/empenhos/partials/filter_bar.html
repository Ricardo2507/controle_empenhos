<form method="get" class="filter-card card border-0 shadow-sm mb-4">
  <div class="card-body row g-3 align-items-end">
    <div class="col-md-2"><label class="form-label">Ano</label><select name="ano" class="form-select"><option value="">Todos</option>{% for a in anos %}<option value="{{ a }}" {% if request.GET.ano == a|stringformat:'s' %}selected{% endif %}>{{ a }}</option>{% endfor %}</select></div>
    <div class="col-md-2"><label class="form-label">Mês</label><select name="mes" class="form-select"><option value="">Todos</option>{% for n,m in meses %}<option value="{{ n }}" {% if request.GET.mes == n|stringformat:'s' %}selected{% endif %}>{{ m }}</option>{% endfor %}</select></div>
    <div class="col-md-3"><label class="form-label">Processo</label><select name="processo" class="form-select"><option value="">Todos</option>{% for p in processos %}<option value="{{ p.id }}" {% if request.GET.processo == p.id|stringformat:'s' %}selected{% endif %}>{{ p.numero }}</option>{% endfor %}</select></div>
    <div class="col-md-2"><label class="form-label">Classe</label><select name="classe" class="form-select"><option value="">Todas</option>{% for c in classes %}<option value="{{ c.id }}" {% if request.GET.classe == c.id|stringformat:'s' %}selected{% endif %}>{{ c.codigo }}</option>{% endfor %}</select></div>
    <div class="col-md-2"><label class="form-label">Categoria</label><select name="categoria" class="form-select"><option value="">Todas</option>{% for c in categorias %}<option value="{{ c.id }}" {% if request.GET.categoria == c.id|stringformat:'s' %}selected{% endif %}>{{ c.nome }}</option>{% endfor %}</select></div>
    <div class="col-md-1 d-grid"><button class="btn btn-primary"><i class="bi bi-funnel"></i></button></div>
  </div>
</form>
