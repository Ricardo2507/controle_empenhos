{% load static %}

<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar | Controle de Empenhos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'empenhos/css/app.css' %}" rel="stylesheet">
</head>

<body class="login-page">

<div class="login-wrapper">

  <div class="login-card">

    <div class="login-icon">
      <i class="bi bi-kanban"></i>
    </div>

    <h1>Controle de Empenhos</h1>
    <p>Acesse o painel gerencial.</p>

    {% if form.errors %}
      <div class="alert alert-danger small border-0">
        Usuário ou senha inválidos.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Usuário</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-person"></i>
          </span>
          {{ form.username }}
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Senha</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-lock"></i>
          </span>
          {{ form.password }}
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 rounded-pill login-btn">
        <i class="bi bi-box-arrow-in-right"></i>
        Entrar
      </button>
    </form>

  </div>

</div>

</body>
</html>
